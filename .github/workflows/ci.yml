name: Release Integrity Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pinned Claude Code CLI
        run: npm install --global @anthropic-ai/claude-code@2.1.158

      - name: Validate marketplace manifest
        run: claude plugin validate .

      - name: Verify release version and update contract
        run: |
          python3 tools/check-release-versions.py
          python3 tools/check-plugin-update-contract.py

      - name: Build and inspect release bundle
        run: |
          set -euo pipefail
          OUT_DIR="$(mktemp -d)"
          trap 'rm -rf "$OUT_DIR"' EXIT
          bash tools/build-skills.sh "$OUT_DIR"
          ZIP="$OUT_DIR/dbskill-$(tr -d '[:space:]' < VERSION).zip"
          test -f "$ZIP"
          test "$(unzip -Z1 "$ZIP" | grep -E '\.zip$' | wc -l | tr -d ' ')" = \
            "$(python3 -c 'import json; print(len(json.load(open(".claude-plugin/marketplace.json"))["plugins"]))')"
